<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>🔐 Phishing URL Detector</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here">
        <br><br>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

</body>
</html>
